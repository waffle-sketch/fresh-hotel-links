<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MrSwaffle's Fresh Hotel Retro Links</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323:wght@400&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #FFD700;
    --gold-dark: #B8960C;
    --teal: #00C8C8;
    --teal-dark: #007A7A;
    --bg: #0a0e1a;
    --bg2: #111827;
    --bg3: #1a2236;
    --border: #2a3a5a;
    --text: #e8f0ff;
    --muted: #7a90b8;
    --red: #FF4466;
    --green: #00E080;
    --pixel: 'Press Start 2P', monospace;
    --vt: 'VT323', monospace;
  }

  body {
    font-family: var(--vt);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse at 20% 50%, rgba(0,200,200,0.04) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(255,215,0,0.04) 0%, transparent 60%),
      repeating-linear-gradient(0deg, transparent, transparent 31px, rgba(255,255,255,0.015) 31px, rgba(255,255,255,0.015) 32px),
      repeating-linear-gradient(90deg, transparent, transparent 31px, rgba(255,255,255,0.015) 31px, rgba(255,255,255,0.015) 32px);
  }

  header {
    text-align: center;
    padding: 2.5rem 1rem 1.5rem;
  }
  .header-badge {
    display: inline-block;
    font-family: var(--pixel);
    font-size: 7px;
    letter-spacing: 3px;
    color: var(--teal);
    background: rgba(0,200,200,0.08);
    border: 1px solid rgba(0,200,200,0.25);
    padding: 5px 14px;
    margin-bottom: 14px;
  }
  @keyframes neonFlash {
    0%, 100% { color: #00cfff; text-shadow: 0 0 8px #00cfff, 0 0 20px #00cfff, 0 0 40px #00cfff, 3px 3px 0 #005580; }
    50% { color: #80eaff; text-shadow: 0 0 4px #00cfff, 0 0 10px #00cfff, 3px 3px 0 #005580; }
  }
  h1 {
    font-family: var(--pixel);
    font-size: clamp(14px, 3vw, 22px);
    color: #00cfff;
    text-shadow: 0 0 8px #00cfff, 0 0 20px #00cfff, 0 0 40px #00cfff, 3px 3px 0 #005580;
    animation: neonFlash 1.5s ease-in-out infinite;
    letter-spacing: 2px;
    line-height: 1.6;
  }
  .star-row { color: var(--teal); font-size: 18px; letter-spacing: 6px; margin: 10px 0; opacity: 0.6; }

  /* CONTROLS */
  .controls {
    max-width: 900px;
    margin: 0 auto 1.5rem;
    padding: 0 1rem;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
  }
  .search-box { flex: 1; min-width: 180px; }
  .search-box input {
    width: 100%;
    font-family: var(--vt);
    font-size: 20px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-bottom: 2px solid var(--teal-dark);
    color: var(--text);
    padding: 8px 12px;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-box input::placeholder { color: var(--muted); }
  .search-box input:focus { border-bottom-color: var(--teal); }

  .pixel-btn {
    font-family: var(--pixel);
    font-size: 8px;
    padding: 10px 14px;
    cursor: pointer;
    border: none;
    transition: transform 0.1s;
    letter-spacing: 1px;
    white-space: nowrap;
  }
  .pixel-btn:active { transform: translateY(2px); }
  .pixel-btn.gold { background: var(--gold); color: #1a1000; box-shadow: 3px 3px 0 var(--gold-dark); }
  .pixel-btn.gold:active { box-shadow: 1px 1px 0 var(--gold-dark); }
  .pixel-btn.teal { background: var(--teal); color: #001a1a; box-shadow: 3px 3px 0 var(--teal-dark); }
  .pixel-btn.teal:active { box-shadow: 1px 1px 0 var(--teal-dark); }

  /* TAB BAR */
  .tab-bar-wrap {
    max-width: 900px;
    margin: 0 auto 0;
    padding: 0 1rem;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .tab-bar-wrap::-webkit-scrollbar { display: none; }
  .tab-bar {
    display: flex;
    border-bottom: 2px solid var(--border);
    min-width: max-content;
  }
  .tab {
    font-family: var(--pixel);
    font-size: 7px;
    padding: 10px 16px;
    cursor: pointer;
    border: 1px solid transparent;
    border-bottom: none;
    background: transparent;
    color: var(--muted);
    letter-spacing: 1px;
    transition: all 0.15s;
    position: relative;
    bottom: -2px;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .tab:hover { color: var(--text); background: var(--bg3); }
  .tab.active { border-color: var(--border); border-bottom: 2px solid var(--bg2); background: var(--bg2); }

  .tab[data-cat="all"].active      { color: var(--text);  border-top: 2px solid var(--muted); }
  .tab[data-cat="hotel"].active    { color: var(--teal);  border-top: 2px solid var(--teal); }
  .tab[data-cat="staff"].active    { color: var(--gold);  border-top: 2px solid var(--gold); }
  .tab[data-cat="events"].active   { color: var(--green); border-top: 2px solid var(--green); }
  .tab[data-cat="cms"].active      { color: var(--red);   border-top: 2px solid var(--red); }
  .tab[data-cat="other"].active    { color: var(--muted); border-top: 2px solid #556; }

  .tab-dot {
    width: 6px; height: 6px;
    display: inline-block;
    flex-shrink: 0;
  }
  .dot-all    { background: var(--muted); }
  .dot-hotel  { background: var(--teal); }
  .dot-staff  { background: var(--gold); }
  .dot-events { background: var(--green); }
  .dot-cms    { background: var(--red); }
  .dot-other  { background: #556; }

  .tab-count {
    font-family: var(--vt);
    font-size: 14px;
    opacity: 0.6;
  }

  /* TAB CONTENT PANEL */
  .tab-panel {
    max-width: 900px;
    margin: 0 auto;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-top: none;
    padding: 1.25rem 1rem;
    min-height: 200px;
  }

  .stats { font-size: 17px; color: var(--muted); margin-bottom: 1rem; }
  .stats span { color: var(--gold); }

  /* GRID */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
    gap: 12px;
  }
  .card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-top: 2px solid var(--teal-dark);
    padding: 1rem;
    display: flex;
    flex-direction: column;
    gap: 10px;
    transition: border-color 0.2s, transform 0.15s;
    position: relative;
  }
  .card:hover { transform: translateY(-2px); }

  .card.cat-hotel  { border-top-color: var(--teal); }
  .card.cat-staff  { border-top-color: var(--gold); }
  .card.cat-events { border-top-color: var(--green); }
  .card.cat-cms    { border-top-color: var(--red); }
  .card.cat-other  { border-top-color: #556; }

  .card.cat-hotel:hover  { border-color: var(--teal); }
  .card.cat-staff:hover  { border-color: var(--gold); }
  .card.cat-events:hover { border-color: var(--green); }
  .card.cat-cms:hover    { border-color: var(--red); }
  .card.cat-other:hover  { border-color: #556; }

  .card-head { display: flex; align-items: flex-start; gap: 10px; }
  .favicon {
    width: 32px; height: 32px;
    background: var(--bg3);
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; font-size: 16px; overflow: hidden;
  }
  .favicon img { width: 100%; height: 100%; object-fit: contain; }
  .card-title-wrap { flex: 1; min-width: 0; }
  .card-name {
    font-family: var(--pixel);
    font-size: 9px;
    color: #00cfff;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 4px;
  }
  .card-url { font-size: 16px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card-desc { font-size: 18px; color: var(--text); line-height: 1.4; }
  .card-foot {
    display: flex; align-items: center; justify-content: space-between;
    border-top: 1px solid var(--border);
    padding-top: 8px; margin-top: 2px;
  }
  .badge { font-family: var(--pixel); font-size: 6px; padding: 3px 7px; letter-spacing: 1px; }
  .badge-hotel  { background: rgba(0,200,200,0.15); color: var(--teal); border: 1px solid rgba(0,200,200,0.3); }
  .badge-staff  { background: rgba(255,215,0,0.15); color: var(--gold); border: 1px solid rgba(255,215,0,0.3); }
  .badge-events { background: rgba(0,224,128,0.12); color: var(--green); border: 1px solid rgba(0,224,128,0.3); }
  .badge-cms    { background: rgba(255,68,102,0.12); color: var(--red); border: 1px solid rgba(255,68,102,0.3); }
  .badge-other  { background: rgba(122,144,184,0.12); color: var(--muted); border: 1px solid rgba(122,144,184,0.2); }

  .card-actions { display: flex; gap: 6px; align-items: center; }
  .sm-btn {
    font-family: var(--pixel);
    font-size: 7px;
    padding: 5px 8px;
    cursor: pointer;
    border: 1px solid;
    background: transparent;
    transition: all 0.15s;
  }
  .sm-btn.edit { border-color: var(--teal-dark); color: var(--teal); }
  .sm-btn.edit:hover { background: var(--teal); color: #001a1a; }
  .sm-btn.del { border-color: #8b0022; color: var(--red); }
  .sm-btn.del:hover { background: var(--red); color: #fff; }
  .open-link {
    font-family: var(--pixel);
    font-size: 7px;
    color: #00cfff;
    text-decoration: none;
    border: 1px solid var(--gold-dark);
    padding: 5px 8px;
    transition: all 0.15s;
  }
  .open-link:hover { background: var(--gold); color: #1a1000; }

  .empty-state {
    text-align: center;
    padding: 3rem 0;
    font-family: var(--pixel);
    font-size: 9px;
    color: var(--muted);
    line-height: 2.5;
    grid-column: 1/-1;
  }

  /* MODAL */
  .modal-bg {
    display: none; position: fixed; inset: 0;
    background: rgba(0,5,15,0.85);
    z-index: 100; align-items: center; justify-content: center; padding: 1rem;
  }
  .modal-bg.open { display: flex; }
  .modal {
    background: var(--bg2);
    border: 1px solid var(--teal);
    border-top: 3px solid var(--teal);
    padding: 1.5rem; width: 100%; max-width: 420px;
    box-shadow: 0 0 40px rgba(0,200,200,0.15);
  }
  .modal h2 { font-family: var(--pixel); font-size: 10px; color: var(--teal); margin-bottom: 1.25rem; letter-spacing: 2px; }
  .field { display: flex; flex-direction: column; gap: 5px; margin-bottom: 14px; }
  .field label { font-family: var(--pixel); font-size: 7px; color: var(--muted); letter-spacing: 1px; }
  .field input, .field select, .field textarea {
    font-family: var(--vt); font-size: 20px;
    background: var(--bg); border: 1px solid var(--border);
    border-bottom: 2px solid var(--teal-dark);
    color: var(--text); padding: 8px 10px; outline: none; width: 100%;
    transition: border-color 0.2s;
  }
  .field textarea { resize: vertical; min-height: 70px; }
  .field input:focus, .field select:focus, .field textarea:focus { border-bottom-color: var(--teal); }
  .field select option { background: var(--bg2); }
  .modal-foot { display: flex; justify-content: flex-end; gap: 10px; margin-top: 1.25rem; }

  body::after {
    content: ''; position: fixed; inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.03) 3px, rgba(0,0,0,0.03) 4px);
    pointer-events: none; z-index: 9999;
  }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--teal-dark); }
</style>
</head>
<body>

<header>
  <div class="header-badge">★ FRESH HOTEL RETRO ★</div>
  <h1>MRSWAFFLE'S<br>LINK VAULT</h1>
  <div class="star-row">· · · · · · · · ·</div>
</header>

<div class="controls">
  <div class="search-box">
    <input type="text" id="search" placeholder="Search links..."/>
  </div>
  <button class="pixel-btn gold" onclick="openModal()">+ ADD LINK</button>
</div>

<div class="tab-bar-wrap">
  <div class="tab-bar" id="tab-bar"></div>
</div>
<div class="tab-panel">
  <div class="stats" id="stats"></div>
  <div class="grid" id="grid"></div>
</div>

<!-- Modal -->
<div class="modal-bg" id="modal-bg" onclick="handleOverlayClick(event)">
  <div class="modal">
    <h2 id="modal-title">ADD NEW LINK</h2>
    <div class="field"><label>NAME</label><input id="f-name" placeholder="e.g. My Hotel"/></div>
    <div class="field"><label>URL</label><input id="f-url" placeholder="https://..."/></div>
    <div class="field">
      <label>CATEGORY</label>
      <select id="f-cat">
        <option value="hotel">Hotel / Game</option>
        <option value="staff">Staff</option>
        <option value="events">Events</option>
        <option value="cms">CMS / Admin</option>
        <option value="other">Other</option>
      </select>
    </div>
    <div class="field"><label>DESCRIPTION (OPTIONAL)</label><textarea id="f-desc" placeholder="What is this link for?"></textarea></div>
    <div class="modal-foot">
      <button class="pixel-btn" style="background:var(--bg3);color:var(--muted);box-shadow:3px 3px 0 #000;font-family:var(--pixel);font-size:8px;padding:10px 14px;cursor:pointer;border:none;" onclick="closeModal()">CANCEL</button>
      <button class="pixel-btn teal" onclick="saveLink()">SAVE LINK</button>
    </div>
  </div>
</div>

<script>
const CATS = {
  hotel:  { label: 'Hotel / Game', badge: 'badge-hotel',  dot: 'dot-hotel' },
  staff:  { label: 'Staff',        badge: 'badge-staff',  dot: 'dot-staff' },
  events: { label: 'Events',       badge: 'badge-events', dot: 'dot-events' },
  cms:    { label: 'CMS / Admin',  badge: 'badge-cms',    dot: 'dot-cms' },
  other:  { label: 'Other',        badge: 'badge-other',  dot: 'dot-other' },
};

let links = JSON.parse(localStorage.getItem('habbolinks') || '[]');
if (!links.length) {
  links = [
    { id: 1,  name: 'Staff Bot',                url: 'https://fresh-hotel.org/katie/bot/index.php',        category: 'events', desc: 'admin/admin123' },
    { id: 2,  name: 'Event Hub',                url: 'https://fresh-hotel.org/katie/events/index.php',     category: 'events', desc: 'admin/admin123' },
    { id: 3,  name: 'Leaderboard',              url: 'https://fresh-hotel.org/leaderboard/index.php',      category: 'events', desc: 'admin/admin123' },
    { id: 4,  name: 'Social Media Advertising', url: 'https://fresh-hotel.org/mrsneller/',                 category: 'staff',  desc: 'admin/freshotel2025' },
    { id: 5,  name: 'Push Notification',        url: 'https://fresh-hotel.org/mrsneller/package/',         category: 'staff',  desc: 'admin/FreshHotel2024!' },
    { id: 6,  name: 'Server Panel',             url: 'https://fresh-hotel.org/duo/',                       category: 'cms',    desc: 'panel/FreshPanel2024!' },
    { id: 7,  name: 'Profile Customiser',       url: 'https://fresh-hotel.org/duo/customizer.php',         category: 'staff',  desc: 'admin/fresh2026' },
    { id: 8,  name: 'Fresh Store Page',         url: 'https://fresh-hotel.org/store/admin.php',            category: 'staff',  desc: 'admin/storechecker4443' },
    { id: 9,  name: 'Reset Password',           url: 'https://fresh-hotel.org/reset.php',                  category: 'cms',    desc: 'admin/!admin@321!' },
    { id: 10, name: 'Lookup User',              url: 'https://fresh-hotel.org/lookup.php',                 category: 'cms',    desc: 'Look up users' },
    { id: 11, name: 'Mass Print Ltd',           url: 'https://fresh-hotel.org/limiteds/index.php',         category: 'staff',  desc: 'admin/admin123' },
    { id: 12, name: 'Send Furni',               url: 'https://fresh-hotel.org/jack/orders/send_furni.php', category: 'staff',  desc: 'admin/admin123' },
    { id: 13, name: 'Quest & Daily Rewards',    url: 'https://fresh-hotel.org/quests/quests.php',          category: 'staff',  desc: 'admin/admin123' },
  ];
  save();
}

let nextId = Math.max(...links.map(l => l.id), 0) + 1;
let search = '';
let activeCat = 'all';
let editId = null;

function save() { localStorage.setItem('habbolinks', JSON.stringify(links)); }

function favicon(url) {
  try { return 'https://www.google.com/s2/favicons?sz=32&domain=' + new URL(url).hostname; } catch(e) { return null; }
}

function countFor(cat) {
  return cat === 'all' ? links.length : links.filter(l => l.category === cat).length;
}

function filtered() {
  const q = search.toLowerCase();
  return links.filter(l => {
    const mq = !q || l.name.toLowerCase().includes(q) || l.url.toLowerCase().includes(q) || (l.desc||'').toLowerCase().includes(q);
    const mc = activeCat === 'all' || l.category === activeCat;
    return mq && mc;
  });
}

function renderTabs() {
  const tabs = [
    { cat: 'all', label: 'ALL', dot: 'dot-all' },
    ...Object.entries(CATS).map(([k, v]) => ({ cat: k, label: v.label.toUpperCase(), dot: v.dot }))
  ];
  document.getElementById('tab-bar').innerHTML = tabs.map(t =>
    `<button class="tab${activeCat === t.cat ? ' active' : ''}" data-cat="${t.cat}" onclick="setCat('${t.cat}')">
      <span class="tab-dot ${t.dot}"></span>
      ${t.label}
      <span class="tab-count">${countFor(t.cat)}</span>
    </button>`
  ).join('');
}

function renderGrid() {
  const f = filtered();
  document.getElementById('stats').innerHTML = search
    ? `Found <span>${f.length}</span> result${f.length !== 1 ? 's' : ''}`
    : `<span>${f.length}</span> link${f.length !== 1 ? 's' : ''}`;

  if (!f.length) {
    document.getElementById('grid').innerHTML = `<div class="empty-state">NO LINKS HERE YET<br><br>CLICK + ADD LINK TO GET STARTED</div>`;
    return;
  }
  document.getElementById('grid').innerHTML = f.map(l => {
    const cat = CATS[l.category] || CATS.other;
    const fav = favicon(l.url);
    return `<div class="card cat-${l.category}">
      <div class="card-head">
        <div class="favicon">${fav ? '<img src="' + fav + '" onerror="this.parentNode.textContent=\'★\'"/>' : '★'}</div>
        <div class="card-title-wrap">
          <div class="card-name">${l.name}</div>
          <div class="card-url">${l.url}</div>
        </div>
      </div>
      ${l.desc ? '<div class="card-desc">' + l.desc + '</div>' : ''}
      <div class="card-foot">
        <span class="badge ${cat.badge}">${cat.label.toUpperCase()}</span>
        <div class="card-actions">
          <button class="sm-btn edit" onclick="editLink(${l.id})">EDIT</button>
          <button class="sm-btn del" onclick="deleteLink(${l.id})">DEL</button>
          <a class="open-link" href="${l.url}" target="_blank" rel="noopener">OPEN ↗</a>
        </div>
      </div>
    </div>`;
  }).join('');
}

function render() { renderTabs(); renderGrid(); }
function setCat(c) { activeCat = c; render(); }

document.getElementById('search').addEventListener('input', e => { search = e.target.value; render(); });

function openModal(id = null) {
  editId = id;
  document.getElementById('modal-title').textContent = id ? 'EDIT LINK' : 'ADD NEW LINK';
  if (id) {
    const l = links.find(x => x.id === id);
    document.getElementById('f-name').value = l.name;
    document.getElementById('f-url').value = l.url;
    document.getElementById('f-cat').value = l.category;
    document.getElementById('f-desc').value = l.desc || '';
  } else {
    document.getElementById('f-name').value = '';
    document.getElementById('f-url').value = activeCat !== 'all' ? '' : '';
    document.getElementById('f-cat').value = activeCat !== 'all' ? activeCat : 'hotel';
    document.getElementById('f-desc').value = '';
  }
  document.getElementById('modal-bg').classList.add('open');
  setTimeout(() => document.getElementById('f-name').focus(), 50);
}

function closeModal() { document.getElementById('modal-bg').classList.remove('open'); editId = null; }
function handleOverlayClick(e) { if (e.target.id === 'modal-bg') closeModal(); }

function saveLink() {
  const name = document.getElementById('f-name').value.trim();
  let url = document.getElementById('f-url').value.trim();
  const category = document.getElementById('f-cat').value;
  const desc = document.getElementById('f-desc').value.trim();
  if (!name || !url) { alert('Name and URL are required!'); return; }
  if (!/^https?:\/\//i.test(url)) url = 'https://' + url;
  if (editId) {
    links = links.map(l => l.id === editId ? { ...l, name, url, category, desc } : l);
  } else {
    links.push({ id: nextId++, name, url, category, desc });
  }
  save(); closeModal(); render();
}

function editLink(id) { openModal(id); }

function deleteLink(id) {
  if (!confirm('Delete this link?')) return;
  links = links.filter(l => l.id !== id);
  save(); render();
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

render();
</script>
</body>
</html>
